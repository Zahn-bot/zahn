<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>物理交互课件平台</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
}

header {
    text-align: center;
    padding: 30px;
    font-size: 28px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
}

.title {
    font-size: 20px;
    margin-bottom: 10px;
}

.desc {
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<header>📚 我的物理课件平台</header>

<div class="grid">

<!-- 卡片1 -->
<div class="card" onclick="go('光线作图.html')">
    <div class="title">🔍 光线作图</div>
    <div class="desc">光线作图演示</div>
</div>

<!-- 卡片2（先放占位，之后你会用到） -->
<div class="card" onclick="go('动滑轮距离关系核心演示.html')">
    <div class="title">💡 动滑轮距离关系</div>
    <div class="desc">动滑轮距离关系核心演示</div>
</div>

<!-- 卡片3 -->
<div class="card" onclick="alert('还没上传')">
    <div class="title">🌈 折射现象</div>
    <div class="desc">敬请期待</div>
</div>

</div>

<script>
function go(url){
    window.location.href = url;
}
</script>

</body>
</html>
