<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>物理课件平台</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
}

/* 顶部 */
header {
    padding: 30px;
    font-size: 28px;
    font-weight: bold;
}

/* 网格 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap: 20px;
    padding: 20px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.1);
}

/* 标题 */
.title {
    font-size: 18px;
    margin-bottom: 10px;
}

/* 描述 */
.desc {
    font-size: 13px;
    color: #aaa;
}
</style>
</head>
